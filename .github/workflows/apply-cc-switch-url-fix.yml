name: Apply CC Switch release URL fix

on:
  push:
    branches:
      - agent/fix-cc-switch-release-url
    paths:
      - .github/workflows/apply-cc-switch-url-fix.yml

permissions:
  contents: write

jobs:
  apply-fix:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout fix branch
        uses: actions/checkout@v4
        with:
          ref: agent/fix-cc-switch-release-url

      - name: Add regression test
        shell: bash
        run: |
          python3 - <<'PY'
          from pathlib import Path

          path = Path('tests/test_installers.py')
          content = path.read_text(encoding='utf-8')
          marker = '\n\nif __name__ == "__main__":\n'
          test = '''
              def test_release_metadata_download_log_cannot_pollute_asset_url(self) -> None:
                  content = (ROOT / "install.sh").read_text(encoding="utf-8")
                  self.assertIn(
                      'download "$GITHUB_API_URL" "$json" >&2',
                      content,
                      "release_asset_url is used inside command substitution, so metadata logs must go to stderr",
                  )
          '''
          test = '\n' + test.strip('\n') + '\n'
          assert marker in content, 'test insertion marker not found'
          assert 'test_release_metadata_download_log_cannot_pollute_asset_url' not in content
          path.write_text(content.replace(marker, test + marker, 1), encoding='utf-8')
          PY

      - name: Verify regression test fails before fix
        shell: bash
        run: |
          set +e
          python3 -m unittest discover -s tests -p 'test_installers.py' -k release_metadata_download_log_cannot_pollute_asset_url -v
          status=$?
          set -e
          if [ "$status" -eq 0 ]; then
            echo 'Regression test unexpectedly passed before the fix.' >&2
            exit 1
          fi

      - name: Apply minimal fix
        shell: bash
        run: |
          python3 - <<'PY'
          from pathlib import Path

          path = Path('install.sh')
          content = path.read_text(encoding='utf-8')
          old = '  download "$GITHUB_API_URL" "$json"\n'
          new = '  download "$GITHUB_API_URL" "$json" >&2\n'
          assert content.count(old) == 1, f'expected exactly one vulnerable call, found {content.count(old)}'
          path.write_text(content.replace(old, new, 1), encoding='utf-8')
          PY

      - name: Verify full suite
        shell: bash
        run: |
          python3 -m unittest discover -s tests -v
          bash -n install.sh

      - name: Commit tested fix and remove temporary workflow
        shell: bash
        run: |
          rm .github/workflows/apply-cc-switch-url-fix.yml
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add install.sh tests/test_installers.py .github/workflows/apply-cc-switch-url-fix.yml
          git commit -m 'fix: keep CC Switch release URL output clean'
          git push origin HEAD:agent/fix-cc-switch-release-url
