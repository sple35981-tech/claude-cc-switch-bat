# PR synchronization trigger: assemble only after checks pass.
name: apply installer payload

on:
  push:
    branches: [feature/installer-progress-system]
    paths:
      - '.installer-payload/**'
      - '.github/workflows/apply-installer-payload.yml'
  pull_request:
    branches: [main]
    paths:
      - '.installer-payload/**'
      - '.github/workflows/apply-installer-payload.yml'

permissions:
  contents: write

jobs:
  assemble-test-commit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feature/installer-progress-system
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Assemble transparent source payload
        shell: bash
        run: |
          set -Eeuo pipefail
          cat .installer-payload/install.sh.part00 .installer-payload/install.sh.part01 .installer-payload/install.sh.part02 .installer-payload/install.sh.part03 > install.sh
          cat .installer-payload/install.ps1.part00 .installer-payload/install.ps1.part01 .installer-payload/install.ps1.part02 > /tmp/install.ps1.no-bom
          python - <<'PY'
          from pathlib import Path
          source = Path('/tmp/install.ps1.no-bom').read_bytes()
          Path('install.ps1').write_bytes(b'\xef\xbb\xbf' + source)
          PY
          mkdir -p tests .github/workflows
          cat .installer-payload/tests.py.part00 .installer-payload/tests.py.part01 > tests/test_installers.py
          cp .installer-payload/README.md README.md
          cp .installer-payload/README_EN.md README_EN.md
          cp .installer-payload/container_matrix.sh tests/container_matrix.sh
          cp .installer-payload/test.yml .github/workflows/test.yml
          chmod +x install.sh tests/container_matrix.sh
      - name: Verify exact source checksums
        shell: bash
        run: |
          set -Eeuo pipefail
          echo '9031adc7f05afc5727597064389e6014711d68f916013fb7159c0854826a23ec  install.sh' | sha256sum -c -
          echo 'e2ebb3406385c229a1b5e62480d9784f59c4c1c6d1486fe4e2b4fc01ecba62f1  install.ps1' | sha256sum -c -
          echo 'eff90bf7c3a74e2a4393caf4085a1bf5413133152b23ec022a7031f84ce9f617  README.md' | sha256sum -c -
          echo '12e3e177beebe5357b02f054e03f4c6bfacb7c410f58763941561636bfccf60f  README_EN.md' | sha256sum -c -
          echo '22a03ff727d212dc28a9e1777a62d23c841278e858424b47a5d8ed4413e9174d  tests/test_installers.py' | sha256sum -c -
          echo '196aa0d0f0154a1888d202b93c7b4f3c8d94b33ce39a2fdbf6a22631384f194b  tests/container_matrix.sh' | sha256sum -c -
          echo 'bab0c2d2c8639de354672f70972386c8030b13645f6bfa7140aa6e8411824655  .github/workflows/test.yml' | sha256sum -c -
      - name: Run verification suite
        shell: bash
        run: |
          set +e
          {
            set -Eeuo pipefail
            bash -n install.sh
            python -m py_compile tests/test_installers.py
            python -m unittest discover -s tests -v
            bash tests/container_matrix.sh
          } > verification.log 2>&1
          status=$?
          cat verification.log
          exit "$status"
      - name: Upload verification diagnostics
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: installer-assembly-verification
          path: verification.log
          retention-days: 3
      - name: Commit verified installer files
        shell: bash
        run: |
          set -Eeuo pipefail
          rm -rf .installer-payload
          rm -f .github/workflows/apply-installer-payload.yml
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A
          git update-index --chmod=+x install.sh tests/container_matrix.sh
          git commit -m 'feat: add installer progress and detailed logs'
          git push origin HEAD:feature/installer-progress-system
