name: test

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Run repository tests
        shell: bash
        run: python -m unittest discover -s tests -v

      - name: Run Linux command sandbox matrix
        if: runner.os == 'Linux'
        shell: bash
        run: python tests/container_matrix.py

      - name: Validate Bash syntax
        if: runner.os != 'Windows'
        shell: bash
        run: bash -n install.sh

      - name: Bash all-components dry run
        if: runner.os != 'Windows'
        shell: bash
        run: bash install.sh --install all --dry-run --non-interactive --skip-network-check --no-progress

      - name: Validate Windows PowerShell 5.1 and dry run
        if: runner.os == 'Windows'
        shell: powershell
        run: |
          $tokens = $null
          $errors = $null
          [System.Management.Automation.Language.Parser]::ParseFile(
            (Resolve-Path .\install.ps1),
            [ref]$tokens,
            [ref]$errors
          ) | Out-Null
          if ($errors.Count -gt 0) {
            $errors | Format-List | Out-String | Write-Error
            exit 1
          }
          .\install.ps1 -Install all -DryRun -NonInteractive -SkipNetworkCheck -NoProgress

      - name: Upload failure diagnostics
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: failure-${{ matrix.os }}
          path: |
            *.log
            **/*.log
          if-no-files-found: ignore
          retention-days: 3
