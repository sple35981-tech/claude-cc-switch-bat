name: test

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  test:
    name: ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-latest
          - windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Run repository tests
        shell: bash
        run: |
          set +e
          python -m unittest discover -s tests -v > repository-tests.log 2>&1
          status=$?
          cat repository-tests.log
          exit "$status"

      - name: Validate Bash syntax
        if: runner.os != 'Windows'
        run: bash -n install.sh

      - name: Bash all-components dry run
        if: runner.os != 'Windows'
        shell: bash
        env:
          INSTALLER_TEST_OS: linux
          INSTALLER_TEST_ARCH: x86_64
          INSTALLER_TEST_DISTRO: debian
          INSTALLER_FAKE_ASSET_URL: https://github.com/farion1231/cc-switch/releases/download/v9.9.9/CC-Switch-v9.9.9-Linux-x86_64.deb
        run: bash install.sh --install all --dry-run --non-interactive --skip-network-check

      - name: Validate PowerShell syntax and all-components dry run
        if: runner.os == 'Windows'
        shell: powershell
        run: |
          Start-Transcript -Path powershell-validation.log -Force
          $tokens = $null
          $errors = $null
          [System.Management.Automation.Language.Parser]::ParseFile(
            (Resolve-Path .\install.ps1),
            [ref]$tokens,
            [ref]$errors
          ) | Out-Null
          if ($errors.Count -gt 0) {
            $errors | Format-List | Out-String | Write-Error
            exit 1
          }
          $env:INSTALLER_TEST_ARCH = 'AMD64'
          $env:INSTALLER_FAKE_ASSET_URL = 'https://github.com/farion1231/cc-switch/releases/download/v9.9.9/CC-Switch-v9.9.9-Windows.msi'
          .\install.ps1 -Install all -DryRun -NonInteractive -SkipNetworkCheck
          Stop-Transcript

      - name: Upload failure diagnostics
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: failure-${{ matrix.os }}
          path: |
            repository-tests.log
            powershell-validation.log
          if-no-files-found: ignore
          retention-days: 3
