name: test

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  cross-platform:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Repository tests
        shell: bash
        run: python -m unittest discover -s tests -v
      - name: Bash syntax and container path matrix
        if: runner.os != 'Windows'
        shell: bash
        run: |
          bash -n install.sh
          bash tests/container_matrix.sh
      - name: PowerShell 5.1 syntax and all-component dry-run
        if: runner.os == 'Windows'
        shell: powershell
        run: |
          $tokens = $null
          $errors = $null
          [System.Management.Automation.Language.Parser]::ParseFile(
            (Resolve-Path .\install.ps1),
            [ref]$tokens,
            [ref]$errors
          ) | Out-Null
          if ($errors.Count -gt 0) {
            $errors | Format-List | Out-String | Write-Error
            exit 1
          }
          $env:INSTALLER_TEST_ARCH = 'AMD64'
          .\install.ps1 -Install all -DryRun -NonInteractive -SkipNetworkCheck -NoProgress -LogFile "$env:TEMP\ai-cli-installer-ci.log"

  kali-container:
    runs-on: ubuntu-latest
    container: kalilinux/kali-rolling
    steps:
      - name: Install test dependencies
        run: |
          apt-get update
          DEBIAN_FRONTEND=noninteractive apt-get install -y --no-install-recommends bash python3 curl ca-certificates
      - uses: actions/checkout@v4
      - name: Kali unit and smoke tests
        shell: bash
        run: |
          test -f /.dockerenv
          python3 -m unittest discover -s tests -v
          bash -n install.sh
          bash tests/container_matrix.sh
          bash install.sh --install cc-switch --dry-run --non-interactive --skip-network-check --no-progress --log-file /tmp/kali-cc-switch.log
          grep -q 'DISTRO=kali' /tmp/kali-cc-switch.log
