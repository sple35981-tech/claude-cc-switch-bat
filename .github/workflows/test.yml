name: installer-tests

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  cross-platform:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Run repository tests
        run: python -m unittest discover -s tests -v

      - name: Validate Bash syntax
        if: runner.os != 'Windows'
        shell: bash
        run: bash -n install.sh

      - name: Bash all-components dry run
        if: runner.os != 'Windows'
        shell: bash
        run: |
          bash install.sh --install all --dry-run --non-interactive \
            --skip-network-check --no-progress --log-file ./bash-dry-run.log

      - name: Simulated container matrix
        if: runner.os == 'Linux'
        shell: bash
        run: bash tests/container_matrix.sh

      - name: Validate PowerShell syntax and all-components dry run
        if: runner.os == 'Windows'
        shell: powershell
        run: |
          $tokens = $null
          $errors = $null
          [System.Management.Automation.Language.Parser]::ParseFile(
            (Resolve-Path .\install.ps1),
            [ref]$tokens,
            [ref]$errors
          ) | Out-Null
          if ($errors.Count -gt 0) {
            $errors | Format-List | Out-String | Write-Error
            exit 1
          }
          $env:INSTALLER_TEST_ARCH = 'AMD64'
          $env:INSTALLER_FAKE_ASSET_URL = 'https://github.com/farion1231/cc-switch/releases/download/v9.9.9/CC-Switch-v9.9.9-Windows-x64.msi'
          .\install.ps1 -Install all -DryRun -NonInteractive -SkipNetworkCheck -NoProgress -LogFile .\powershell-dry-run.log

      - name: Upload failure diagnostics
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: failure-${{ matrix.os }}
          path: |
            *.log
          if-no-files-found: ignore
          retention-days: 3

  kali-rolling:
    name: kali-rolling-container
    runs-on: ubuntu-latest
    container: kalilinux/kali-rolling
    steps:
      - name: Install test dependencies
        shell: bash
        run: |
          apt-get update
          DEBIAN_FRONTEND=noninteractive apt-get install -y --no-install-recommends \
            bash python3 curl ca-certificates git

      - uses: actions/checkout@v4

      - name: Run Kali validation suite
        shell: bash
        run: |
          set -Eeuo pipefail
          test -f /.dockerenv
          bash -n install.sh
          python3 -m unittest discover -s tests -v
          bash tests/container_matrix.sh
          bash install.sh --install cc-switch --dry-run --non-interactive \
            --skip-network-check --no-progress --log-file /tmp/kali-cc-switch.log
          grep -q 'DISTRO=kali' /tmp/kali-cc-switch.log
          grep -q '100%' /tmp/kali-cc-switch.log

      - name: Upload Kali failure diagnostics
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: failure-kali-rolling
          path: /tmp/*.log
          if-no-files-found: ignore
          retention-days: 3
