name: test

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  test:
    name: ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-latest
          - windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Run repository tests
        run: python -m unittest discover -s tests -v

      - name: Validate Bash syntax
        if: runner.os != 'Windows'
        run: bash -n install.sh

      - name: Bash dry run
        if: runner.os != 'Windows'
        shell: bash
        env:
          INSTALLER_TEST_OS: linux
          INSTALLER_TEST_ARCH: x86_64
          INSTALLER_TEST_DISTRO: debian
          INSTALLER_FAKE_RELEASE_TAG: v9.9.9
          INSTALLER_FAKE_ASSET_URL: https://github.com/farion1231/cc-switch/releases/download/v9.9.9/CC-Switch-v9.9.9-Linux-x86_64.deb
        run: ./install.sh --dry-run --non-interactive --skip-network-check

      - name: Validate PowerShell syntax and dry run
        if: runner.os == 'Windows'
        shell: powershell
        run: |
          $tokens = $null
          $errors = $null
          [System.Management.Automation.Language.Parser]::ParseFile(
            (Resolve-Path .\install.ps1),
            [ref]$tokens,
            [ref]$errors
          ) | Out-Null
          if ($errors.Count -gt 0) {
            $errors | Format-List | Out-String | Write-Error
            exit 1
          }
          $env:INSTALLER_TEST_ARCH = 'AMD64'
          $env:INSTALLER_FAKE_ASSET_URL = 'https://github.com/farion1231/cc-switch/releases/download/v9.9.9/CC-Switch-v9.9.9-Windows.msi'
          .\install.ps1 -DryRun -NonInteractive -SkipNetworkCheck
